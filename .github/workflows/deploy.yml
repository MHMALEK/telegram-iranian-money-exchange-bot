# Build, push to GHCR (public), deploy to Oracle VM over SSH.
#
# GitHub Actions secrets/variables and Docker env mapping: README.md → section "Deploy".
# Env vars pass through SSH into `docker run -e NAME` (values not embedded in script).
#
# After first push: Packages → image → Package settings → Change visibility → Public
#
name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        run: echo "IMAGE_NAME=${REGISTRY}/$(echo ${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy on VM
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_LISTINGS_CHANNEL_ID: ${{ secrets.TELEGRAM_LISTINGS_CHANNEL_ID }}
          TELEGRAM_MEMBERSHIP_CHANNEL_ID: ${{ secrets.TELEGRAM_MEMBERSHIP_CHANNEL_ID }}
          TELEGRAM_MEMBERSHIP_GROUP_ID: ${{ secrets.TELEGRAM_MEMBERSHIP_GROUP_ID }}
          TELEGRAM_CHANNEL_INVITE_URL: ${{ secrets.TELEGRAM_CHANNEL_INVITE_URL }}
          TELEGRAM_MEMBERSHIP_GROUP_INVITE_URL: ${{ secrets.TELEGRAM_MEMBERSHIP_GROUP_INVITE_URL }}
          TELEGRAM_DISABLE_MEMBERSHIP_GATE: ${{ vars.TELEGRAM_DISABLE_MEMBERSHIP_GATE }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          IRR_RATES_TTL_SECONDS: ${{ vars.IRR_RATES_TTL_SECONDS }}
          IRR_USD_JSON_URL: ${{ vars.IRR_USD_JSON_URL }}
          IRR_EUR_JSON_URL: ${{ vars.IRR_EUR_JSON_URL }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: TELEGRAM_BOT_TOKEN,DATABASE_URL,TELEGRAM_LISTINGS_CHANNEL_ID,TELEGRAM_MEMBERSHIP_CHANNEL_ID,TELEGRAM_MEMBERSHIP_GROUP_ID,TELEGRAM_CHANNEL_INVITE_URL,TELEGRAM_MEMBERSHIP_GROUP_INVITE_URL,TELEGRAM_DISABLE_MEMBERSHIP_GATE,API_BASE_URL,IRR_RATES_TTL_SECONDS,IRR_USD_JSON_URL,IRR_EUR_JSON_URL
          script_stop: true
          script: |
            set -e
            for v in TELEGRAM_BOT_TOKEN DATABASE_URL; do
              eval "val=\$$v"
              if [ -z "$val" ]; then
                echo "$v must be set (GitHub Actions secret)"
                exit 1
              fi
            done
            if [ -z "${TELEGRAM_LISTINGS_CHANNEL_ID:-}" ] && [ -z "${TELEGRAM_MEMBERSHIP_CHANNEL_ID:-}" ]; then
              echo "Set TELEGRAM_LISTINGS_CHANNEL_ID and/or TELEGRAM_MEMBERSHIP_CHANNEL_ID"
              exit 1
            fi
            E="-e TELEGRAM_BOT_TOKEN -e DATABASE_URL -e TELEGRAM_LISTINGS_CHANNEL_ID -e TELEGRAM_MEMBERSHIP_CHANNEL_ID"
            for v in TELEGRAM_MEMBERSHIP_GROUP_ID TELEGRAM_CHANNEL_INVITE_URL TELEGRAM_MEMBERSHIP_GROUP_INVITE_URL TELEGRAM_DISABLE_MEMBERSHIP_GATE API_BASE_URL IRR_RATES_TTL_SECONDS IRR_USD_JSON_URL IRR_EUR_JSON_URL; do
              eval "val=\$$v"
              if [ -n "$val" ]; then
                E="$E -e $v"
              fi
            done
            docker pull "${{ env.IMAGE_NAME }}:latest"
            docker stop exchange-money-bot 2>/dev/null || true
            docker rm exchange-money-bot 2>/dev/null || true
            docker run -d \
              --name exchange-money-bot \
              --restart unless-stopped \
              $E \
              -p 8000:8000 \
              "${{ env.IMAGE_NAME }}:latest"
            docker image prune -f
