# Build, push to GHCR (public), deploy to Oracle VM over SSH.
#
# GitHub Actions secrets/variables and Docker env mapping: README.md → section "Deploy".
# Env vars pass through SSH into `docker run -e NAME` (values not embedded in script).
#
# After first push: Packages → image → Package settings → Change visibility → Public
# Deploy assumes the GHCR package is public so the VPS can `docker pull` without login.
#
name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        run: echo "IMAGE_NAME=${REGISTRY}/$(echo ${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy on VM
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_LISTINGS_CHANNEL_ID: ${{ secrets.TELEGRAM_LISTINGS_CHANNEL_ID }}
          TELEGRAM_MEMBERSHIP_CHANNEL_ID: ${{ secrets.TELEGRAM_MEMBERSHIP_CHANNEL_ID }}
          TELEGRAM_MEMBERSHIP_GROUP_ID: ${{ secrets.TELEGRAM_MEMBERSHIP_GROUP_ID }}
          TELEGRAM_CHANNEL_INVITE_URL: ${{ secrets.TELEGRAM_CHANNEL_INVITE_URL }}
          TELEGRAM_MEMBERSHIP_GROUP_INVITE_URL: ${{ secrets.TELEGRAM_MEMBERSHIP_GROUP_INVITE_URL }}
          TELEGRAM_DISABLE_MEMBERSHIP_GATE: ${{ vars.TELEGRAM_DISABLE_MEMBERSHIP_GATE }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          IRR_RATES_TTL_SECONDS: ${{ vars.IRR_RATES_TTL_SECONDS }}
          IRR_USD_JSON_URL: ${{ vars.IRR_USD_JSON_URL }}
          IRR_EUR_JSON_URL: ${{ vars.IRR_EUR_JSON_URL }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: TELEGRAM_BOT_TOKEN,DATABASE_URL,TELEGRAM_LISTINGS_CHANNEL_ID,TELEGRAM_MEMBERSHIP_CHANNEL_ID,TELEGRAM_MEMBERSHIP_GROUP_ID,TELEGRAM_CHANNEL_INVITE_URL,TELEGRAM_MEMBERSHIP_GROUP_INVITE_URL,TELEGRAM_DISABLE_MEMBERSHIP_GATE,API_BASE_URL,IRR_RATES_TTL_SECONDS,IRR_USD_JSON_URL,IRR_EUR_JSON_URL
          script_stop: true
          script: |
            set -e
            if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
              echo "TELEGRAM_BOT_TOKEN must be set (GitHub Actions secret)"
              exit 1
            fi
            if [ -z "${DATABASE_URL:-}" ]; then
              echo "DATABASE_URL must be set (GitHub Actions secret)"
              exit 1
            fi
            if [ -z "${TELEGRAM_LISTINGS_CHANNEL_ID:-}" ]; then
              echo "TELEGRAM_LISTINGS_CHANNEL_ID must be set in GitHub Actions secrets (required for listings)."
              echo "If you only had TELEGRAM_MEMBERSHIP_CHANNEL_ID before, add TELEGRAM_LISTINGS_CHANNEL_ID with your listings channel id (often the same -100… value)."
              exit 1
            fi
            E="-e TELEGRAM_BOT_TOKEN -e DATABASE_URL -e TELEGRAM_LISTINGS_CHANNEL_ID"
            [ -n "${TELEGRAM_MEMBERSHIP_CHANNEL_ID:-}" ] && E="$E -e TELEGRAM_MEMBERSHIP_CHANNEL_ID"
            [ -n "${TELEGRAM_MEMBERSHIP_GROUP_ID:-}" ] && E="$E -e TELEGRAM_MEMBERSHIP_GROUP_ID"
            [ -n "${TELEGRAM_CHANNEL_INVITE_URL:-}" ] && E="$E -e TELEGRAM_CHANNEL_INVITE_URL"
            [ -n "${TELEGRAM_MEMBERSHIP_GROUP_INVITE_URL:-}" ] && E="$E -e TELEGRAM_MEMBERSHIP_GROUP_INVITE_URL"
            [ -n "${TELEGRAM_DISABLE_MEMBERSHIP_GATE:-}" ] && E="$E -e TELEGRAM_DISABLE_MEMBERSHIP_GATE"
            [ -n "${API_BASE_URL:-}" ] && E="$E -e API_BASE_URL"
            [ -n "${IRR_RATES_TTL_SECONDS:-}" ] && E="$E -e IRR_RATES_TTL_SECONDS"
            [ -n "${IRR_USD_JSON_URL:-}" ] && E="$E -e IRR_USD_JSON_URL"
            [ -n "${IRR_EUR_JSON_URL:-}" ] && E="$E -e IRR_EUR_JSON_URL"
            # Public GHCR image: anonymous pull on the VPS (no docker login).
            docker pull "${{ env.IMAGE_NAME }}:latest"
            docker stop exchange-money-bot 2>/dev/null || true
            docker rm exchange-money-bot 2>/dev/null || true
            docker run -d \
              --name exchange-money-bot \
              --restart unless-stopped \
              $E \
              -p 8000:8000 \
              "${{ env.IMAGE_NAME }}:latest"
            docker image prune -f
